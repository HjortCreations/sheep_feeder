#####################################################################
#  sheep_feeder.cfg
#####################################################################
#  Sheep Feeder / Cheap Feeder hardware configuration.
#
#  Hardware:
#  - BTT EBB42 V1.2 over USB.
#  - Orbiter 2.0 / Orbiter 2.5 as external feeder.
#  - Annex Engineering Belay on PB8.
#  - BTT SFS V2.0 switch/runout signal on PB4.
#  - BTT SFS V2.0 motion/encoder signal on PB3.
#  - EBB42 Fan0 on PA0 as driver cooling fan.
#
#  Include from printer.cfg:
#    [include sheep_feeder.cfg]
#    [include sheep_feeder_macro.cfg]
#
#  Important:
#  - Replace the USB serial path with your real EBB42 by-id path.
#  - Check motor direction before loading real filament.
#  - Keep [force_move] only once in your total config.
#####################################################################

[include sheep_feeder_macro.cfg]


#####################################################################
#  MCU - BTT EBB42 V1.2 over USB
#####################################################################

[mcu sheep_feeder]                                                   # Defines the EBB42 board as a separate MCU named sheep_feeder.
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_1D000F0008504D4D36383520-if00  # Replace with your real by-id path from: ls /dev/serial/by-id/


#####################################################################
#  Force Move
#####################################################################

[force_move]                                                         # Required for manual movement of the external feeder stepper.
enable_force_move: True                                              # Allows FORCE_MOVE commands used by Sheep Feeder load/unload macros.


#####################################################################
#  Sheep Feeder Stepper - Orbiter 2.0 / Orbiter 2.5
#####################################################################

[extruder_stepper sheep_feeder]                                      # Defines the Orbiter as a secondary extruder stepper.
extruder: extruder                                                   # Links this stepper to the main extruder motion queue by default.
step_pin: sheep_feeder:PD0                                           # EBB42 V1.2 step pin for the onboard stepper driver.
dir_pin: !sheep_feeder:PD1                                           # EBB42 V1.2 direction pin. Remove ! if the feeder runs backwards.
enable_pin: !sheep_feeder:PD2                                        # EBB42 V1.2 enable pin. Usually inverted.
microsteps: 16                                                       # Standard and safe microstepping value.
rotation_distance: 4.75                                              # Typical Orbiter 2.x starting value. Calibrate later if needed.
full_steps_per_rotation: 200                                         # Standard 1.8 degree stepper motor.


[tmc2209 extruder_stepper sheep_feeder]                              # TMC2209 configuration for the Sheep Feeder Orbiter.
uart_pin: sheep_feeder:PA15                                          # EBB42 V1.2 UART pin for the extruder driver.
run_current: 0.750                                                   # Safe starting current for Orbiter 2.x.
hold_current: 0.250                                                  # Lower hold current to reduce idle motor heat.
sense_resistor: 0.110                                                # Common TMC2209 sense resistor value.
stealthchop_threshold: 0                                             # Forces spreadCycle for reliable filament feeding.
interpolate: True                                                    # Enables internal 256 microstep interpolation.

[autotune_tmc extruder_stepper sheep_feeder]
motor: ldo-36sth20-1004ahg-xh


#####################################################################
#  Sheep Feeder Driver Fan - EBB42 Fan0
#####################################################################

[controller_fan sheep_feeder_driver_fan]                             # Fan0 cooling for the EBB42 stepper driver.
pin: sheep_feeder:PA0                                                # EBB42 V1.2 Fan0 pin.
stepper: extruder_stepper sheep_feeder                               # Fan starts when the Sheep Feeder stepper driver is active.
idle_timeout: 60                                                     # Keeps the fan running for 60 seconds after the driver becomes inactive.
fan_speed: 1.0                                                       # Full fan speed when active.


#####################################################################
#  Annex Engineering Belay - Kalico Native Control
#####################################################################

[belay sheep_belay]                                                  # Kalico-native Belay control section.
extruder_type: extruder_stepper                                      # Sheep Feeder uses an extruder_stepper as secondary feeder.
extruder_stepper_name: sheep_feeder                                  # Must match [extruder_stepper sheep_feeder].
sensor_pin: ^sheep_feeder:PB8                                        # Belay signal input on PB8 with pull-up enabled.
multiplier_high: 1.04                                                # Feeds slightly more when Belay indicates that more filament is needed.
multiplier_low: 0.98                                                 # Feeds slightly less when Belay indicates that less filament is needed.
debug_level: 0                                                       # Useful during testing. Set to 0 once stable.


#####################################################################
#  BTT SFS V2.0 - Switch / Runout Sensor
#####################################################################

[filament_switch_sensor sheep_sfs_switch]                            # BTT SFS V2.0 filament presence/runout switch.
switch_pin: sheep_feeder:PB6                                         # EBB42 V1.2 filament switch input according to BTT sample config.
pause_on_runout: False                                               # Our macro handles whether to pause or only report.
runout_gcode:                                                        # Runs when the switch reports no filament.
    SHEEP_FEEDER_RUNOUT SENSOR=SFS_SWITCH                            # Calls shared Sheep Feeder runout handler.
insert_gcode:                                                        # Runs when filament is inserted again.
    SHEEP_FEEDER_INSERT_GRAB


#####################################################################
#  BTT SFS V2.0 - Motion / Encoder Sensor
#####################################################################

[filament_motion_sensor sheep_sfs_motion]                            # BTT SFS V2.0 filament motion/encoder signal.
switch_pin: ^sheep_feeder:PB5                                        # EBB42 V1.2 motion input according to BTT sample config.
detection_length: 10.0                                               # Starting value. Increase if it false-triggers; decrease for faster reaction.
extruder: extruder                                                   # Watches commanded movement from the main extruder.
pause_on_runout: False                                               # Our macro handles whether to pause or only report.
runout_gcode:                                                        # Runs when commanded extrusion happens without detected filament motion.
    SHEEP_FEEDER_RUNOUT SENSOR=SFS_MOTION                            # Calls shared Sheep Feeder runout handler.
insert_gcode:                                                        # Runs when filament motion is detected again.
    RESPOND MSG="Sheep Feeder: SFS V2.0 motion detected."             # Console message for restored motion.
