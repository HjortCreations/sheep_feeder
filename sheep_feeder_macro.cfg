#####################################################################
#  sheep_feeder_macro_simplified_v2.cfg
#####################################################################
#  Sheep Feeder / Cheap Feeder macros.
#
#  Philosophy:
#  - During normal printing, Sheep Feeder should behave like part of the
#    main extruder system.
#  - No start/end macro is required just to make Belay or Sheep Feeder work.
#  - Load/unload are special cases and temporarily control Sheep Feeder.
#  - After load/unload, Sheep Feeder is always synced back to the main extruder.
#  - SFS sensors are disabled during load/unload to avoid false triggers.
#
#  Main physical measurements:
#  - sheep_gear_to_extruder_gear_length:
#      Distance from Sheep Feeder drive gear to toolhead extruder drive gear.
#  - extruder_gear_to_nozzle_length:
#      Distance from toolhead extruder drive gear to nozzle / melt zone.
#####################################################################


#####################################################################
#  Sheep Feeder Variables
#####################################################################

[gcode_macro SHEEP_FEEDER_VARS]                                      # Central variable holder for Sheep Feeder.
description: Variables for Sheep Feeder load and unload macros        # UI description.

#####################################################################
#  Main Physical Filament Path Lengths
#####################################################################

variable_sheep_gear_to_extruder_gear_length: 1900                    # Distance from Sheep Feeder drive gear to toolhead extruder drive gear.
variable_extruder_gear_to_nozzle_length: 85                          # Distance from toolhead extruder drive gear to nozzle / melt zone.

#####################################################################
#  Load / Unload Behaviour
#####################################################################

variable_grab_length: 40                                             # Initial slow feed distance so the Sheep Feeder Orbiter grabs filament safely.
variable_approach_length: 80                                         # Final slow Sheep Feeder-only approach before filament reaches the toolhead extruder gear.
variable_nozzle_prime_length: 20                                     # Extra extrusion after reaching the nozzle to make sure filament flows.

variable_extruder_gear_clearance_length: 40                          # During unload, retract this far past the toolhead extruder gear before Sheep Feeder pulls alone.
variable_unload_extra_length: 80                                     # Extra reverse distance to make sure filament clears the Sheep Feeder path.

#####################################################################
#  Speeds
#####################################################################

variable_grab_speed: 8                                               # Initial load speed in mm/s.
variable_fast_load_speed: 80                                         # Fast Sheep Feeder-only load speed in mm/s.
variable_approach_speed: 10                                          # Slow approach speed before reaching toolhead extruder gear in mm/s.
variable_finish_speed: 8                                             # Final synced feed speed into hotend/nozzle in mm/s.
variable_unload_fast_speed: 80                                       # Fast Sheep Feeder-only reverse speed in mm/s.
variable_unload_slow_speed: 8                                        # Slow synced reverse speed through hotend/toolhead in mm/s.

#####################################################################
#  Temperature Presets
#####################################################################

variable_default_material: "PLA"                                     # Default material preset if no TEMP or MATERIAL is provided.
variable_temp_pla: 220                                               # PLA load/unload preset temperature.
variable_temp_petg: 240                                              # PETG load/unload preset temperature.
variable_temp_abs: 250                                               # ABS load/unload preset temperature.
variable_temp_asa: 250                                               # ASA load/unload preset temperature.
variable_temp_tpu: 225                                               # TPU load/unload preset temperature.
variable_temp_pa: 260                                                # PA/Nylon load/unload preset temperature.
variable_wait_for_temp: 1                                            # 1 = wait with M109, 0 = do not heat/wait.

#####################################################################
#  RAM / Coldpull Settings
#####################################################################

variable_ram_length: 20                                              # Length to push filament into nozzle before unload.
variable_ram_speed: 6                                                # Speed for nozzle ram in mm/s.
variable_coldpull_heat_temp: 220                                     # Temperature used before cooling for coldpull.
variable_coldpull_temp: 90                                           # Temperature where the coldpull is pulled.
variable_coldpull_cooling_wait: 30                                   # Extra wait at coldpull temperature in seconds.
variable_coldpull_pull_length: 25                                    # Initial coldpull pull distance using synced main extruder motion.
variable_coldpull_pull_speed: 3                                      # Initial coldpull pull speed in mm/s.

#####################################################################
#  Behaviour Flags
#####################################################################

variable_disable_sensors_during_load_unload: 1                       # 1 = disable SFS during load/unload to avoid false triggers.
variable_enable_sensors_after_load: 1                                # 1 = enable SFS after load.
variable_enable_sensors_after_unload: 0                              # 1 = enable SFS after unload, 0 = keep disabled because filament is normally removed.

gcode:
    RESPOND MSG="Sheep Feeder: Variable holder only."                 # Prevents empty macro error and confirms the macro exists.


#####################################################################
#  SFS Sensor Helpers
#####################################################################

[gcode_macro SHEEP_FEEDER_SENSORS_ON]                                # Enable both SFS V2.0 sensors.
description: Enable Sheep Feeder SFS V2.0 sensors                     # UI description.
gcode:
    SET_FILAMENT_SENSOR SENSOR=sheep_sfs_switch ENABLE=1              # Enables SFS switch/runout sensor.
    SET_FILAMENT_SENSOR SENSOR=sheep_sfs_motion ENABLE=1              # Enables SFS motion/encoder sensor.
    RESPOND MSG="Sheep Feeder: SFS sensors enabled."                  # Console confirmation.


[gcode_macro SHEEP_FEEDER_SENSORS_OFF]                               # Disable both SFS V2.0 sensors.
description: Disable Sheep Feeder SFS V2.0 sensors                    # UI description.
gcode:
    SET_FILAMENT_SENSOR SENSOR=sheep_sfs_switch ENABLE=0              # Disables SFS switch/runout sensor.
    SET_FILAMENT_SENSOR SENSOR=sheep_sfs_motion ENABLE=0              # Disables SFS motion/encoder sensor.
    RESPOND MSG="Sheep Feeder: SFS sensors disabled."                 # Console confirmation.


#####################################################################
#  Sheep Feeder Insert Grab
#####################################################################

[gcode_macro SHEEP_FEEDER_INSERT_GRAB]                               # Grabs filament when SFS switch detects insertion.
description: Slowly grab newly inserted filament with Sheep Feeder    # UI description.
gcode:
    {% set length = params.LENGTH|default(30)|float %}                 # Feed length in mm after filament is detected.
    {% set speed = params.SPEED|default(3)|float %}                    # Slow feed speed in mm/s.

    RESPOND MSG="Sheep Feeder: Filament detected, grabbing {length} mm at {speed} mm/s."

    SYNC_EXTRUDER_MOTION EXTRUDER=sheep_feeder MOTION_QUEUE=          # Temporarily lets Sheep Feeder move alone.
    FORCE_MOVE STEPPER="extruder_stepper sheep_feeder" DISTANCE={length} VELOCITY={speed} # Slowly feeds filament forward.
    SYNC_EXTRUDER_MOTION EXTRUDER=sheep_feeder MOTION_QUEUE=extruder  # Returns Sheep Feeder to normal extruder-following mode.

    RESPOND MSG="Sheep Feeder: Insert grab complete."


#####################################################################
#  Diagnostics
#####################################################################

[gcode_macro SHEEP_FEEDER_PATH_INFO]                                 # Reports configured filament path lengths.
description: Report Sheep Feeder filament path lengths                # UI description.
gcode:
    {% set v = printer["gcode_macro SHEEP_FEEDER_VARS"] %}            # Reads central Sheep Feeder variables.
    {% set sheep_to_extruder = v.sheep_gear_to_extruder_gear_length|float %} # Reads Sheep gear to extruder gear length.
    {% set extruder_to_nozzle = v.extruder_gear_to_nozzle_length|float %} # Reads extruder gear to nozzle length.
    {% set total_to_nozzle = sheep_to_extruder + extruder_to_nozzle %} # Calculates Sheep gear to nozzle length.
    RESPOND MSG="Sheep Feeder path: Sheep gear to extruder gear = {sheep_to_extruder} mm."
    RESPOND MSG="Sheep Feeder path: Extruder gear to nozzle = {extruder_to_nozzle} mm."
    RESPOND MSG="Sheep Feeder path: Sheep gear to nozzle = {total_to_nozzle} mm."

#####################################################################
#  Sheep Feeder Belay Status
#####################################################################

[gcode_macro SHEEP_BELAY_STATUS]                                     # Reports if Belay compensation is enabled and what sensor state it sees.
description: Report Sheep Feeder Belay enabled state and sensor state # UI description.
gcode:
    {% set b = printer["belay sheep_belay"] %}                        # Reads the Kalico Belay status object.

    {% if b.enabled %}
        {% set enabled_text = "ACTIVE / ENABLED" %}                   # Belay compensation is enabled.
    {% else %}
        {% set enabled_text = "INACTIVE / DISABLED" %}                # Belay compensation is disabled.
    {% endif %}

    {% if b.last_state %}
        {% set state_text = "compressed" %}                           # Sensor is triggered / Belay slider is compressed.
    {% else %}
        {% set state_text = "expanded" %}                             # Sensor is not triggered / Belay slider is expanded.
    {% endif %}

    RESPOND MSG="Sheep Feeder Belay: {enabled_text}. Sensor state: {state_text}."


#####################################################################
#  Simple Manual Move
#####################################################################

[gcode_macro SHEEP_FEEDER_MOVE]                                      # Simple manual move using only Sheep Feeder.
description: Move Sheep Feeder stepper manually                       # UI description.
gcode:
    {% set length = params.LENGTH|default(100)|float %}                # Move distance in mm. Positive = load, negative = unload.
    {% set speed = params.SPEED|default(10)|float %}                   # Move speed in mm/s.
    {% set v = printer["gcode_macro SHEEP_FEEDER_VARS"] %}            # Reads central Sheep Feeder variables.

    {% if v.disable_sensors_during_load_unload|int == 1 %}
        SHEEP_FEEDER_SENSORS_OFF                                      # Prevents sensor-triggered pauses during manual movement.
    {% endif %}

    SYNC_EXTRUDER_MOTION EXTRUDER=sheep_feeder MOTION_QUEUE=          # Temporarily desyncs Sheep Feeder so FORCE_MOVE can move it alone.
    FORCE_MOVE STEPPER="extruder_stepper sheep_feeder" DISTANCE={length} VELOCITY={speed} # Moves Sheep Feeder directly.
    SYNC_EXTRUDER_MOTION EXTRUDER=sheep_feeder MOTION_QUEUE=extruder  # Always returns Sheep Feeder to normal extruder-following mode.

    RESPOND MSG="Sheep Feeder: Manual move {length} mm at {speed} mm/s complete." # Console confirmation.


[gcode_macro SHEEP_FEEDER_LOAD]                                      # Simple manual forward feed using Sheep Feeder.
description: Feed filament forward with Sheep Feeder                  # UI description.
gcode:
    {% set length = params.LENGTH|default(100)|float %}                # Feed distance in mm.
    {% set speed = params.SPEED|default(10)|float %}                   # Feed speed in mm/s.
    SHEEP_FEEDER_MOVE LENGTH={length} SPEED={speed}                   # Calls the simple move macro.
    SHEEP_FEEDER_SENSORS_ON                                           # Load normally means filament is present again.


[gcode_macro SHEEP_FEEDER_UNLOAD]                                    # Simple manual reverse feed using Sheep Feeder.
description: Retract filament backward with Sheep Feeder              # UI description.
gcode:
    {% set length = params.LENGTH|default(100)|float %}                # Retract distance in mm.
    {% set speed = params.SPEED|default(10)|float %}                   # Retract speed in mm/s.
    SHEEP_FEEDER_MOVE LENGTH=-{length} SPEED={speed}                  # Calls the simple move macro with negative distance.
    {% if printer["gcode_macro SHEEP_FEEDER_VARS"].enable_sensors_after_unload|int == 1 %}
        SHEEP_FEEDER_SENSORS_ON                                       # Optional after unload.
    {% endif %}


#####################################################################
#  Runout Handler
#####################################################################

[gcode_macro SHEEP_FEEDER_RUNOUT]                                    # Shared runout handler for SFS switch and motion sensor.
description: Runout handler for Sheep Feeder SFS V2.0                 # UI description.
gcode:
    {% set sensor = params.SENSOR|default("unknown") %}               # Reads which sensor triggered the event.

    {% if sensor == "SFS_SWITCH" %}
        RESPOND TYPE=error MSG="Sheep Feeder: SFS V2.0 switch reports no filament." # Switch/runout error.
    {% elif sensor == "SFS_MOTION" %}
        RESPOND TYPE=error MSG="Sheep Feeder: SFS V2.0 motion sensor reports no filament movement." # Motion/encoder error.
    {% else %}
        RESPOND TYPE=error MSG="Sheep Feeder: Filament problem detected by {sensor}." # Fallback error.
    {% endif %}

    PAUSE                                                             # Existing PAUSE macro decides if anything should actually happen.


#####################################################################
#  Material Temperature Resolver
#####################################################################
#  This is duplicated inside load/unload because Klipper macros do not
#  have reusable functions. The priority is:
#  1. Explicit TEMP parameter.
#  2. Existing hotend target if already set.
#  3. MATERIAL preset.
#####################################################################


#####################################################################
#  Smart Load
#####################################################################
#  Load sequence:
#  1. Sheep Feeder grabs filament slowly.
#  2. Sheep Feeder feeds fast toward the toolhead.
#  3. Sheep Feeder slows down before the toolhead extruder gear.
#  4. Sheep Feeder syncs back to the main extruder.
#  5. Main extruder and Sheep Feeder feed together from extruder gear to nozzle.
#
#  Examples:
#    SHEEP_FEEDER_SMART_LOAD
#    SHEEP_FEEDER_SMART_LOAD MATERIAL=PETG
#    SHEEP_FEEDER_SMART_LOAD TEMP=245
#    SHEEP_FEEDER_SMART_LOAD SHEEP_TO_EXTRUDER=1320 EXTRUDER_TO_NOZZLE=85 TEMP=250
#####################################################################

[gcode_macro SHEEP_FEEDER_SMART_LOAD]                                # Smart staged load through the reverse Bowden.
description: Load filament through Sheep Feeder with staged speeds    # UI description.
gcode:
    {% set v = printer["gcode_macro SHEEP_FEEDER_VARS"] %}            # Reads central Sheep Feeder variables.

    {% set sheep_to_extruder = params.SHEEP_TO_EXTRUDER|default(v.sheep_gear_to_extruder_gear_length)|float %} # Sheep gear to toolhead extruder gear length.
    {% set extruder_to_nozzle = params.EXTRUDER_TO_NOZZLE|default(v.extruder_gear_to_nozzle_length)|float %} # Toolhead extruder gear to nozzle length.
    {% set material = params.MATERIAL|default(v.default_material)|upper %} # Material preset name.

    {% if params.TEMP is defined %}
        {% set resolved_temp = params.TEMP|float %}                   # Explicit TEMP parameter wins.
    {% elif printer.extruder.target|float > 0 %}
        {% set resolved_temp = printer.extruder.target|float %}       # Uses current hotend target if already set.
    {% elif material == "PLA" %}
        {% set resolved_temp = v.temp_pla|float %}                    # PLA preset.
    {% elif material == "PETG" %}
        {% set resolved_temp = v.temp_petg|float %}                   # PETG preset.
    {% elif material == "ABS" %}
        {% set resolved_temp = v.temp_abs|float %}                    # ABS preset.
    {% elif material == "ASA" %}
        {% set resolved_temp = v.temp_asa|float %}                    # ASA preset.
    {% elif material == "TPU" %}
        {% set resolved_temp = v.temp_tpu|float %}                    # TPU preset.
    {% elif material == "PA" or material == "NYLON" %}
        {% set resolved_temp = v.temp_pa|float %}                     # PA/Nylon preset.
    {% else %}
        {% set resolved_temp = v.temp_pla|float %}                    # Fallback preset.
    {% endif %}

    {% set grab = params.GRAB|default(v.grab_length)|float %}          # Initial slow grab length.
    {% set approach = params.APPROACH|default(v.approach_length)|float %} # Slow approach before extruder gear.
    {% set prime = params.PRIME|default(v.nozzle_prime_length)|float %} # Extra purge/prime after reaching nozzle.
    {% set grab_speed = params.GRAB_SPEED|default(v.grab_speed)|float %} # Initial feed speed.
    {% set fast_speed = params.FAST_SPEED|default(v.fast_load_speed)|float %} # Fast Sheep Feeder-only feed speed.
    {% set approach_speed = params.APPROACH_SPEED|default(v.approach_speed)|float %} # Slow approach speed.
    {% set finish_speed = params.FINISH_SPEED|default(v.finish_speed)|float %} # Final synced feed speed.
    {% set wait_temp = params.WAIT_TEMP|default(v.wait_for_temp)|int %} # 1 = wait for hotend temp, 0 = skip heating/waiting.

    {% set fast_length = sheep_to_extruder - grab - approach %}       # Fast feed distance before slow approach.
    {% set final_synced_length = extruder_to_nozzle + prime %}        # Synced feed from extruder gear to nozzle plus prime.

    {% if sheep_to_extruder <= 0 %}
        RESPOND TYPE=error MSG="Sheep Feeder LOAD: SHEEP_TO_EXTRUDER must be greater than 0."
    {% elif extruder_to_nozzle < 0 %}
        RESPOND TYPE=error MSG="Sheep Feeder LOAD: EXTRUDER_TO_NOZZLE can not be negative."
    {% elif fast_length < 0 %}
        RESPOND TYPE=error MSG="Sheep Feeder LOAD: SHEEP_TO_EXTRUDER is too short for GRAB + APPROACH."
    {% else %}
        SAVE_GCODE_STATE NAME=SHEEP_FEEDER_LOAD_STATE                 # Saves current absolute/relative extrusion state.
        M83                                                           # Uses relative extrusion for synced toolhead movement.

        {% if v.disable_sensors_during_load_unload|int == 1 %}
            SHEEP_FEEDER_SENSORS_OFF                                  # Disables SFS while manually loading.
        {% endif %}

        SYNC_EXTRUDER_MOTION EXTRUDER=sheep_feeder MOTION_QUEUE=      # Sheep Feeder moves alone during Bowden transport.

        {% if wait_temp == 1 and resolved_temp > 0 %}
            RESPOND MSG="Sheep Feeder: Heating hotend to {resolved_temp}C for load."
            M109 S{resolved_temp}                                     # Waits for selected load temperature.
        {% else %}
            RESPOND MSG="Sheep Feeder: Skipping hotend heat/wait for load."
        {% endif %}

        RESPOND MSG="Sheep Feeder: Grabbing filament, {grab} mm at {grab_speed} mm/s."
        FORCE_MOVE STEPPER="extruder_stepper sheep_feeder" DISTANCE={grab} VELOCITY={grab_speed}

        RESPOND MSG="Sheep Feeder: Fast load toward toolhead extruder gear, {fast_length} mm at {fast_speed} mm/s."
        FORCE_MOVE STEPPER="extruder_stepper sheep_feeder" DISTANCE={fast_length} VELOCITY={fast_speed}

        RESPOND MSG="Sheep Feeder: Slow approach to toolhead extruder gear, {approach} mm at {approach_speed} mm/s."
        FORCE_MOVE STEPPER="extruder_stepper sheep_feeder" DISTANCE={approach} VELOCITY={approach_speed}

        SYNC_EXTRUDER_MOTION EXTRUDER=sheep_feeder MOTION_QUEUE=extruder # Sheep Feeder follows main extruder again.
        RESPOND MSG="Sheep Feeder: Synced feed from extruder gear to nozzle, {final_synced_length} mm at {finish_speed} mm/s."
        G1 E{final_synced_length} F{finish_speed * 60}

        RESTORE_GCODE_STATE NAME=SHEEP_FEEDER_LOAD_STATE              # Restores original extrusion mode/state.

        {% if v.enable_sensors_after_load|int == 1 %}
            SHEEP_FEEDER_SENSORS_ON                                   # Re-enables SFS after successful load.
        {% endif %}

        RESPOND MSG="Sheep Feeder: Smart load complete. Sheep Feeder is synced with extruder."
    {% endif %}


#####################################################################
#  Smart Unload
#####################################################################
#  Unload sequence:
#  1. Sheep Feeder is synced with the main extruder.
#  2. RAM or COLDPULL happens with both extruders synced.
#  3. Main extruder and Sheep Feeder retract together from nozzle past extruder gear.
#  4. Sheep Feeder temporarily desyncs and pulls filament back through Bowden alone.
#  5. Sheep Feeder is synced back to extruder at the end.
#
#  Examples:
#    SHEEP_FEEDER_SMART_UNLOAD MODE=RAM
#    SHEEP_FEEDER_SMART_UNLOAD MODE=RAM MATERIAL=PETG
#    SHEEP_FEEDER_SMART_UNLOAD MODE=COLDPULL
#    SHEEP_FEEDER_SMART_UNLOAD MODE=COLDPULL COLDPULL_HEAT_TEMP=240 COLDPULL_TEMP=95
#####################################################################

[gcode_macro SHEEP_FEEDER_SMART_UNLOAD]                              # Smart staged unload through the reverse Bowden.
description: Unload filament with RAM or COLDPULL mode                # UI description.
gcode:
    {% set v = printer["gcode_macro SHEEP_FEEDER_VARS"] %}            # Reads central Sheep Feeder variables.

    {% set sheep_to_extruder = params.SHEEP_TO_EXTRUDER|default(v.sheep_gear_to_extruder_gear_length)|float %} # Sheep gear to toolhead extruder gear length.
    {% set extruder_to_nozzle = params.EXTRUDER_TO_NOZZLE|default(v.extruder_gear_to_nozzle_length)|float %} # Toolhead extruder gear to nozzle length.
    {% set mode = params.MODE|default("RAM")|upper %}                 # Unload mode: RAM or COLDPULL.
    {% set material = params.MATERIAL|default(v.default_material)|upper %} # Material preset name.

    {% if params.TEMP is defined %}
        {% set unload_temp = params.TEMP|float %}                     # Explicit TEMP parameter wins.
    {% elif printer.extruder.target|float > 0 %}
        {% set unload_temp = printer.extruder.target|float %}         # Uses current hotend target if already set.
    {% elif material == "PLA" %}
        {% set unload_temp = v.temp_pla|float %}                      # PLA preset.
    {% elif material == "PETG" %}
        {% set unload_temp = v.temp_petg|float %}                     # PETG preset.
    {% elif material == "ABS" %}
        {% set unload_temp = v.temp_abs|float %}                      # ABS preset.
    {% elif material == "ASA" %}
        {% set unload_temp = v.temp_asa|float %}                      # ASA preset.
    {% elif material == "TPU" %}
        {% set unload_temp = v.temp_tpu|float %}                      # TPU preset.
    {% elif material == "PA" or material == "NYLON" %}
        {% set unload_temp = v.temp_pa|float %}                       # PA/Nylon preset.
    {% else %}
        {% set unload_temp = v.temp_pla|float %}                      # Fallback preset.
    {% endif %}

    {% set ram_length = params.RAM_LENGTH|default(v.ram_length)|float %} # Nozzle ram length.
    {% set ram_speed = params.RAM_SPEED|default(v.ram_speed)|float %}  # Nozzle ram speed.
    {% set clearance = params.CLEARANCE|default(v.extruder_gear_clearance_length)|float %} # Clearance past toolhead extruder gear.
    {% set unload_extra = params.UNLOAD_EXTRA|default(v.unload_extra_length)|float %} # Extra reverse distance after reaching Sheep gear.
    {% set slow_speed = params.SLOW_SPEED|default(v.unload_slow_speed)|float %} # Slow synced reverse speed.
    {% set fast_speed = params.FAST_SPEED|default(v.unload_fast_speed)|float %} # Fast Sheep Feeder-only reverse speed.
    {% set wait_temp = params.WAIT_TEMP|default(v.wait_for_temp)|int %} # 1 = wait for hotend temp, 0 = skip heating/waiting.

    {% set coldpull_heat_temp = params.COLDPULL_HEAT_TEMP|default(v.coldpull_heat_temp)|float %} # Coldpull heat temperature.
    {% set coldpull_temp = params.COLDPULL_TEMP|default(v.coldpull_temp)|float %} # Coldpull pull temperature.
    {% set cooling_wait = params.COOLING_WAIT|default(v.coldpull_cooling_wait)|float %} # Stabilization wait.
    {% set coldpull_pull_length = params.COLDPULL_PULL_LENGTH|default(v.coldpull_pull_length)|float %} # Initial coldpull pull distance.
    {% set coldpull_pull_speed = params.COLDPULL_PULL_SPEED|default(v.coldpull_pull_speed)|float %} # Initial coldpull pull speed.

    {% set synced_unload_length = extruder_to_nozzle + clearance %}   # Synced unload needed to move filament tip past extruder gear.
    {% if mode == "COLDPULL" %}
        {% set remaining_synced_unload_length = synced_unload_length - coldpull_pull_length %} # Coldpull pull already moved part of synced unload.
    {% else %}
        {% set remaining_synced_unload_length = synced_unload_length %} # RAM mode has not retracted yet.
    {% endif %}
    {% if remaining_synced_unload_length < 0 %}
        {% set remaining_synced_unload_length = 0 %}                  # Prevents negative remaining unload distance.
    {% endif %}

    {% set fast_unload_length = sheep_to_extruder - clearance + unload_extra %} # Sheep Feeder-only reverse distance.

    {% if sheep_to_extruder <= 0 %}
        RESPOND TYPE=error MSG="Sheep Feeder UNLOAD: SHEEP_TO_EXTRUDER must be greater than 0."
    {% elif extruder_to_nozzle < 0 %}
        RESPOND TYPE=error MSG="Sheep Feeder UNLOAD: EXTRUDER_TO_NOZZLE can not be negative."
    {% elif clearance < 0 %}
        RESPOND TYPE=error MSG="Sheep Feeder UNLOAD: CLEARANCE can not be negative."
    {% elif fast_unload_length < 0 %}
        RESPOND TYPE=error MSG="Sheep Feeder UNLOAD: Fast unload length became negative."
    {% elif mode != "RAM" and mode != "COLDPULL" %}
        RESPOND TYPE=error MSG="Sheep Feeder UNLOAD: MODE must be RAM or COLDPULL."
    {% else %}
        SAVE_GCODE_STATE NAME=SHEEP_FEEDER_UNLOAD_STATE               # Saves current absolute/relative extrusion state.
        M83                                                           # Uses relative extrusion for synced toolhead movement.

        {% if v.disable_sensors_during_load_unload|int == 1 %}
            SHEEP_FEEDER_SENSORS_OFF                                  # Disables SFS while manually unloading.
        {% endif %}

        SYNC_EXTRUDER_MOTION EXTRUDER=sheep_feeder MOTION_QUEUE=extruder # Sheep Feeder follows main extruder for nozzle actions.

        {% if mode == "RAM" %}
            {% if wait_temp == 1 and unload_temp > 0 %}
                RESPOND MSG="Sheep Feeder: Heating hotend to {unload_temp}C for RAM unload."
                M109 S{unload_temp}                                  # Waits for selected unload temperature.
            {% endif %}
            RESPOND MSG="Sheep Feeder: Ramming nozzle, {ram_length} mm at {ram_speed} mm/s."
            G1 E{ram_length} F{ram_speed * 60}                        # Rams filament into nozzle using synced motion.

        {% elif mode == "COLDPULL" %}
            {% if wait_temp == 1 and coldpull_heat_temp > 0 %}
                RESPOND MSG="Sheep Feeder: Heating hotend to {coldpull_heat_temp}C for coldpull."
                M109 S{coldpull_heat_temp}                            # Heats to soften/melt filament before coldpull.
            {% endif %}
            RESPOND MSG="Sheep Feeder: Ramming nozzle before coldpull, {ram_length} mm at {ram_speed} mm/s."
            G1 E{ram_length} F{ram_speed * 60}                        # Rams filament into nozzle before cooling.

            {% if wait_temp == 1 and coldpull_temp > 0 %}
                RESPOND MSG="Sheep Feeder: Cooling hotend to {coldpull_temp}C for coldpull."
                M109 S{coldpull_temp}                                 # Waits for coldpull temperature.
                G4 P{cooling_wait * 1000}                             # Stabilizes coldpull plug temperature.
            {% endif %}

            RESPOND MSG="Sheep Feeder: Coldpull initial pull, {coldpull_pull_length} mm at {coldpull_pull_speed} mm/s."
            G1 E-{coldpull_pull_length} F{coldpull_pull_speed * 60}    # Pulls cold plug using synced motion.
        {% endif %}

        RESPOND MSG="Sheep Feeder: Slow synced unload past extruder gear, {remaining_synced_unload_length} mm at {slow_speed} mm/s."
        G1 E-{remaining_synced_unload_length} F{slow_speed * 60}       # Slow reverse through hotend/toolhead using both extruders.

        SYNC_EXTRUDER_MOTION EXTRUDER=sheep_feeder MOTION_QUEUE=      # Sheep Feeder pulls alone through reverse Bowden.
        RESPOND MSG="Sheep Feeder: Fast Sheep Feeder-only unload, {fast_unload_length} mm at {fast_speed} mm/s."
        FORCE_MOVE STEPPER="extruder_stepper sheep_feeder" DISTANCE=-{fast_unload_length} VELOCITY={fast_speed}

        SYNC_EXTRUDER_MOTION EXTRUDER=sheep_feeder MOTION_QUEUE=extruder # Always returns Sheep Feeder to normal extruder-following mode.
        RESTORE_GCODE_STATE NAME=SHEEP_FEEDER_UNLOAD_STATE            # Restores original extrusion mode/state.

        {% if v.enable_sensors_after_unload|int == 1 %}
            SHEEP_FEEDER_SENSORS_ON                                   # Optional after unload.
        {% endif %}

        RESPOND MSG="Sheep Feeder: Smart unload complete using {mode} mode. Sheep Feeder is synced with extruder."
    {% endif %}
